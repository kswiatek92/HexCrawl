name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Detect Python sources
    runs-on: ubuntu-latest
    outputs:
      has_python: ${{ steps.check.outputs.has_python }}
    steps:
      - uses: actions/checkout@v6
      - id: check
        run: |
          if [ -f "pyproject.toml" ] || [ -d "src" ] || ls requirements/*.txt > /dev/null 2>&1; then
            echo "has_python=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_python=false" >> "$GITHUB_OUTPUT"
            echo "No Python sources yet — skipping Python CI." >> "$GITHUB_STEP_SUMMARY"
          fi

  lint:
    name: Lint (ruff) + Format (black)
    needs: preflight
    if: needs.preflight.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install tools
        run: pip install ruff black
      - name: ruff check
        run: ruff check src tests
      - name: black --check
        run: black --check src tests

  typecheck:
    name: Type check (mypy)
    needs: preflight
    if: needs.preflight.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install deps
        run: |
          pip install -r requirements/dev.txt
          pip install mypy
      - name: mypy
        run: mypy src

  test:
    name: Tests + coverage (pytest)
    needs: preflight
    if: needs.preflight.outputs.has_python == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hexcrawl
          POSTGRES_PASSWORD: hexcrawl
          POSTGRES_DB: hexcrawl_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U hexcrawl"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://hexcrawl:hexcrawl@localhost:5432/hexcrawl_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/*.txt
      - name: Install deps
        run: |
          pip install -r requirements/dev.txt
          pip install pytest-cov
      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: python-coverage
          path: coverage.xml
          if-no-files-found: ignore
